name: AI Research Digest – settimanale

on:
  schedule:
    - cron: "0 7 * * 1-5"
    - cron: "0 8 * * 1-5"
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.11"

jobs:
  run-digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_USE_TLS: ${{ secrets.SMTP_USE_TLS }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_BOT_USERNAME: ${{ secrets.TELEGRAM_BOT_USERNAME }}
          TELEGRAM_POLLING_ENABLED: "false"
        run: python -m src.scheduled_run

      - name: Commit digest and push to repo
        run: |
          git config user.name "digest-bot"
          git config user.email "digest-bot@kva.ai"
          git add data/digests/ data/seen_urls.db
          git commit -m "digest: $(date +%Y-%m-%d)" || echo "Nessuna modifica"
          git push
