sources:
  - id: arxiv_ai
    name: "arXiv - cs.AI"
    type: rss
    url: "https://rss.arxiv.org/rss/cs.AI"
    max_items: 30
    priority: low
    tier: preprint
    source_group: arxiv
    max_candidates_per_run: 1
    max_group_candidates_per_run: 1
    max_group_entries_per_digest: 1
    trust_score: 5
    tags: ["paper", "research"]

  - id: arxiv_cl
    name: "arXiv - cs.CL (NLP/LLM)"
    type: rss
    url: "https://rss.arxiv.org/rss/cs.CL"
    max_items: 30
    priority: low
    tier: preprint
    source_group: arxiv
    max_candidates_per_run: 1
    max_group_candidates_per_run: 1
    max_group_entries_per_digest: 1
    trust_score: 5
    tags: ["paper", "nlp", "llm"]

  - id: arxiv_lg
    name: "arXiv - cs.LG (Machine Learning)"
    type: rss
    url: "https://rss.arxiv.org/rss/cs.LG"
    max_items: 20
    priority: low
    tier: preprint
    source_group: arxiv
    max_candidates_per_run: 1
    max_group_candidates_per_run: 1
    max_group_entries_per_digest: 1
    trust_score: 5
    tags: ["paper", "machine-learning"]

  - id: huggingface_papers
    name: "Hugging Face - Daily Papers"
    type: scrape
    url: "https://huggingface.co/papers"
    selector: "article"
    max_items: 20
    priority: high
    tier: community
    max_candidates_per_run: 3
    trust_score: 4
    tags: ["paper", "community"]

  - id: openai_news
    name: "OpenAI - News"
    type: rss
    url: "https://openai.com/news/rss.xml"
    max_items: 10
    priority: high
    tier: official
    max_candidates_per_run: 2
    trust_score: 5
    tags: ["lab", "model", "research"]

  - id: anthropic_research
    name: "Anthropic - Research"
    type: scrape
    url: "https://www.anthropic.com/research"
    selector: "main a[href^='/research/']:not([href*='/team/'])"
    title_selector: "h2, h3, h4"
    max_items: 10
    priority: high
    tier: official
    max_candidates_per_run: 4
    trust_score: 5
    tags: ["lab", "research", "safety"]

